services:
  docs-peagen-com:
    build: .
    container_name: docs-peagen-com
    restart: unless-stopped
    labels:
      site.host: docs.peagen.com
      site.kind: zdx-docs
    expose:
      - "80"
    networks:
      dockerwp:
        aliases:
          - docs-peagen-com

networks:
  dockerwp:
    name: dockerwp
    external: true
